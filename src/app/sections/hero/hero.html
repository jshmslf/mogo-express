<section class="hero">
    <div class="hero-slide" *ngFor="let image of images; let i = index" [class.active]="i === currentSlide()"
        [ngStyle]="{ 'background-image': 'url(' + image + ')' }">
    </div>

    <div class="hero-content">
        <div class="hero-text">
            <h1>Fast and Reliable Delivery</h1>
            <p>Experience seamless logistics with our trusted delivery service.</p>
            <button class="hero-btn">Book Now</button>
        </div>
    </div>

    <div class="hero-indicators">
        <span
            *ngFor="let image of images; let i = index"
            [class.active]="i === currentSlide()"
        ></span>
    </div>
</section>
